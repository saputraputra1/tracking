<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neural AI — Asisten Cerdas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#05050f;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(10,10,30,0.8);backdrop-filter:blur(20px);flex-shrink:0}
.header .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00d4ff,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header .logo svg{width:22px;height:22px}
.header h1{font-size:1rem;font-weight:700;color:#fff}
.header .status{font-size:.72rem;color:#6a6a8e;display:flex;align-items:center;gap:5px;margin-left:auto}
.header .status .dot{width:6px;height:6px;border-radius:50%;background:#00d4ff;display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:900px;width:100%;margin:0 auto;padding:0 20px}
.messages{flex:1;overflow-y:auto;padding:24px 0;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.msg{max-width:85%;padding:14px 20px;border-radius:16px;font-size:.9rem;line-height:1.6;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#00d4ff,#7c3aed);color:#fff;border-radius:16px 16px 4px 16px}
.msg.bot{align-self:flex-start;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#ccc;border-radius:16px 16px 16px 4px}
.msg.bot .label{font-size:.72rem;color:#7c3aed;font-weight:600;margin-bottom:4px}
.typing{align-self:flex-start;display:flex;gap:5px;padding:16px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px 16px 16px 4px}
.typing .dot{width:8px;height:8px;border-radius:50%;background:#6a6a8e;animation:typingBounce 1.4s ease-in-out infinite}
.typing .dot:nth-child(2){animation-delay:.2s}
.typing .dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-8px);opacity:1}}
.input-wrap{display:flex;gap:10px;padding:16px 0 24px;flex-shrink:0}
.input-wrap input{flex:1;padding:14px 20px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#fff;font-size:.9rem;outline:none;font-family:inherit;transition:border-color .3s}
.input-wrap input:focus{border-color:rgba(0,212,255,0.3)}
.input-wrap input::placeholder{color:#4a4a6e}
.input-wrap button{padding:14px 22px;border-radius:14px;border:none;background:linear-gradient(135deg,#00d4ff,#7c3aed);color:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.input-wrap button:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,212,255,0.2)}
.input-wrap button:active{transform:scale(.97)}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:16px;padding:40px}
.welcome .icon{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#00d4ff,#7c3aed);display:flex;align-items:center;justify-content:center}
.welcome .icon svg{width:40px;height:40px}
.welcome h2{font-size:1.5rem;font-weight:700;letter-spacing:-.5px}
.welcome p{color:#6a6a8e;font-size:.9rem;max-width:400px;line-height:1.6}
.welcome .suggestions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.welcome .suggestions button{padding:10px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#8a8aaa;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .3s}
.welcome .suggestions button:hover{border-color:rgba(0,212,255,0.2);color:#00d4ff;background:rgba(0,212,255,0.05)}
@media(max-width:600px){
.header{padding:12px 16px}
.chat-container{padding:0 12px}
.msg{max-width:92%;font-size:.85rem;padding:12px 16px}
.input-wrap input{padding:12px 16px;font-size:16px}
.input-wrap button{padding:12px 16px}
.welcome .suggestions button{font-size:.78rem;padding:8px 14px}
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="10" stroke="#fff" stroke-width="2"/><circle cx="16" cy="11" r="1.5" fill="#fff"/><circle cx="21" cy="14" r="1.5" fill="#fff"/><circle cx="21" cy="19" r="1.5" fill="#fff"/><circle cx="16" cy="22" r="1.5" fill="#fff"/><circle cx="11" cy="20" r="1.5" fill="#fff"/><circle cx="11" cy="15" r="1.5" fill="#fff"/></svg>
    </div>
    <h1>Neural AI</h1>
    <div class="status"><span class="dot"></span> Neural Model v3</div>
</div>

<div class="chat-container">
    <div class="messages" id="messages">
        <div class="welcome" id="welcomeScreen">
            <div class="icon">
                <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="10" stroke="#fff" stroke-width="2"/><circle cx="16" cy="11" r="1.5" fill="#fff"/><circle cx="21" cy="14" r="1.5" fill="#fff"/><circle cx="21" cy="19" r="1.5" fill="#fff"/><circle cx="16" cy="22" r="1.5" fill="#fff"/><circle cx="11" cy="20" r="1.5" fill="#fff"/><circle cx="11" cy="15" r="1.5" fill="#fff"/></svg>
            </div>
            <h2>Selamat datang di Neural AI</h2>
            <p>Asisten kecerdasan buatan yang siap membantu Anda dengan pertanyaan, analisis, dan tugas sehari-hari.</p>
            <div class="suggestions">
                <button onclick="suggest('Apa itu Neural AI?')">Apa itu Neural AI?</button>
                <button onclick="suggest('Bantu saya menulis email')">Bantu menulis email</button>
                <button onclick="suggest('Jelaskan AI dalam 3 kalimat')">Jelaskan AI</button>
                <button onclick="suggest('Ide untuk konten sosial media')">Ide konten</button>
            </div>
        </div>
    </div>

    <div class="input-wrap">
        <input id="chatInput" type="text" placeholder="Ketik pesan ke Neural AI..." autocomplete="off">
        <button id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script src="/config.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="/firebase-config.js"></script>
<script src="/tracker.js"></script>
<script>
// Use socket from tracker.js (global)
socket.on('ai-response', (data) => { removeTyping(); addMessage(data.message, 'bot'); });

function suggest(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
}

function addMessage(text, role) {
    const container = document.getElementById('messages');
    const ws = document.getElementById('welcomeScreen');
    if (ws) ws.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'bot') div.innerHTML = '<div class="label">Neural AI</div>' + text;
    else div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showTyping() {
    const container = document.getElementById('messages');
    if (container.querySelector('.typing')) return;
    const div = document.createElement('div');
    div.className = 'typing';
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function removeTyping() {
    const el = document.querySelector('.typing');
    if (el) el.remove();
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addMessage(msg, 'user');
    showTyping();
    socket.emit('ai-message', { deviceId: localStorage.getItem('deviceId') || '', message: msg });
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
});

// Welcome message from bot on first load
setTimeout(() => {
    const ws = document.getElementById('welcomeScreen');
    if (ws && ws.style.display !== 'none') {
        document.getElementById('chatInput').focus();
    }
}, 500);
</script>
</body>
</html>
