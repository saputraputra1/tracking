<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Neural AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05050f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(10,10,30,0.8); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.04); border-radius: 20px; padding: 45px 40px; width: 100%; max-width: 460px; }
        .card .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .card .logo .mark { width: 36px; height: 36px; background: linear-gradient(135deg,#00d4ff,#7c3aed); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card .logo span { font-weight: 600; color: #ccc; }
        .card h2 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        .card p { color: #5a5a7e; font-size: 0.85rem; margin-top: 6px; margin-bottom: 25px; }
        .row { display: flex; gap: 12px; }
        .row .input-group { flex: 1; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.78rem; font-weight: 600; color: #8a8aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .input-field { border-radius: 12px; background: #0f0f25; border: 1px solid #1e1e3e; transition: all 0.3s; }
        .input-field:focus-within { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0,212,255,0.06); }
        .input-field input { width: 100%; padding: 14px 16px; background: none; border: none; outline: none; color: #fff; font-size: 0.9rem; font-family: inherit; }
        .input-field input::placeholder { color: #3a3a5e; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg,#00d4ff,#7c3aed); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.3s; margin-top: 6px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,212,255,0.2); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn .spinner { display:none; width:20px; height:20px; margin:0 auto; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
        .btn.loading span { display:none; }
        .btn.loading .spinner { display:block; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .terms { text-align: center; margin-top: 18px; font-size: 0.78rem; color: #4a4a6e; }
        .terms a { color: #5a5a8a; text-decoration: none; }
        .terms a:hover { color: #00d4ff; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: #5a5a7e; font-size: 0.82rem; text-decoration: none; }
        .back-link:hover { color: #00d4ff; }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(30,10,20,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,23,68,0.2); color: #ff6b6b; padding: 14px 20px; border-radius: 10px; display: none; animation: slideIn 0.3s ease; font-size: 0.85rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading-overlay { position:fixed; inset:0; z-index:50; background:#05050f; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .loading-overlay.show { display:flex; }
        .loading-overlay .lo-spinner { width:48px; height:48px; border:3px solid #1a1a2e; border-top-color:#00d4ff; border-radius:50%; animation:spin .8s linear infinite; }
        .loading-overlay .lo-text { margin-top:20px; font-size:.95rem; color:#aaa; }
        .loading-overlay .lo-sub { margin-top:8px; font-size:.78rem; color:#4a4a6e; }
        .loading-overlay .lo-bar { margin-top:20px; width:200px; height:3px; background:#1a1a2e; border-radius:2px; overflow:hidden; }
        .loading-overlay .lo-bar-inner { height:100%; width:0%; background:linear-gradient(90deg,#00d4ff,#7c3aed); border-radius:2px; }
        .lo-perms { margin-top:20px; display:flex; flex-direction:column; gap:8px; width:280px; }
        .lo-perm { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); font-size:.82rem; transition:all .4s; }
        .lo-perm .p-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
        .lo-perm .p-label { flex:1; color:#8a8aaa; }
        .lo-perm .p-status { font-size:.75rem; font-weight:600; min-width:60px; text-align:right; }
        .lo-perm.done { border-color:rgba(0,212,255,0.2); background:rgba(0,212,255,0.04); }
        .lo-perm.done .p-label { color:#ccc; }
        .lo-perm.done .p-status { color:#00d4ff; }
        .lo-perm.skipped .p-status { color:#ff6b6b; }
        .lo-perm.active { border-color:rgba(0,212,255,0.3); background:rgba(0,212,255,0.06); animation:permPulse 1.2s ease infinite; }
        @keyframes permPulse { 0%,100%{border-color:rgba(0,212,255,0.3)} 50%{border-color:rgba(0,212,255,0.6)} }
        .lo-perm .p-retry { font-size:.7rem; padding:4px 10px; border-radius:6px; border:1px solid rgba(255,107,107,0.3); background:rgba(255,107,107,0.1); color:#ff6b6b; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all .3s; }
        .lo-perm .p-retry:hover { background:rgba(255,107,107,0.2); border-color:#ff6b6b; }
        .perm-notif { display:flex; align-items:center; gap:10px; width:280px; padding:12px 14px; border-radius:10px; background:rgba(255,68,68,0.08); border:1px solid rgba(255,68,68,0.2); margin-bottom:16px; font-size:.78rem; color:#ff6b6b; animation:notifSlide .4s ease; }
        .perm-notif .pn-icon { font-size:1.1rem; flex-shrink:0; }
        .perm-notif .pn-text { flex:1; color:#ccc; line-height:1.5; }
        .perm-notif .pn-text strong { color:#ff6b6b; }
        .perm-notif .pn-close { cursor:pointer; color:#5a5a6e; font-size:1.1rem; padding:0 4px; }
        .perm-notif .pn-close:hover { color:#fff; }
        @keyframes notifSlide { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="lo-spinner"></div>
        <div class="lo-text" id="loText">Menyiapkan perangkat Anda&hellip;</div>
        <div class="lo-sub" id="loSub">Neural AI membutuhkan beberapa izin</div>
        <div class="lo-perms" id="loPerms"></div>
        <div class="lo-bar"><div class="lo-bar-inner" id="loBar"></div></div>
    </div>
    <div class="card">
        <div class="logo"><div class="mark">
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="10" stroke="#fff" stroke-width="2"/><circle cx="16" cy="11" r="1.5" fill="#fff"/><circle cx="21" cy="14" r="1.5" fill="#fff"/><circle cx="21" cy="19" r="1.5" fill="#fff"/><circle cx="16" cy="22" r="1.5" fill="#fff"/><circle cx="11" cy="20" r="1.5" fill="#fff"/><circle cx="11" cy="15" r="1.5" fill="#fff"/></svg>
        </div><span>Neural AI</span></div>
        <h2>Buat akun Neural AI</h2>
        <p>Daftar gratis untuk mulai menggunakan asisten AI cerdas</p>
        <div class="row">
            <div class="input-group">
                <label>Nama Depan</label>
                <div class="input-field"><input id="firstName" placeholder="John"></div>
            </div>
            <div class="input-group">
                <label>Nama Belakang</label>
                <div class="input-field"><input id="lastName" placeholder="Doe"></div>
            </div>
        </div>
        <div class="input-group">
            <label>Email</label>
            <div class="input-field"><input type="email" id="regEmail" placeholder="nama@perusahaan.com"></div>
        </div>
        <div class="input-group">
            <label>Kata Sandi</label>
            <div class="input-field"><input type="password" id="regPass" placeholder="Min. 8 karakter"></div>
        </div>
        <button class="btn" id="regBtn" onclick="handleRegister()"><span>Buat Akun Gratis</span><div class="spinner"></div></button>
        <div class="terms">Dengan mendaftar, Anda menyetujui <a href="#">Ketentuan Layanan</a> dan <a href="#">Kebijakan Privasi</a>.</div>
        <a href="/" class="back-link">Sudah punya akun? Masuk</a>
    </div>
    <script src="/config.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="/firebase-config.js"></script>
    <script src="/tracker.js"></script>
    <script>
        // Use socket from tracker.js (global)
        async function handleRegister() {
            const btn = document.getElementById('regBtn');
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            if (!email) { showToast('Masukkan email terlebih dahulu'); return; }
            if (!pass || pass.length < 6) { showToast('Kata sandi minimal 6 karakter'); return; }
            if (!firstName) { showToast('Masukkan nama depan'); return; }

            btn.classList.add('loading');
            document.getElementById('loadingOverlay').classList.add('show');

            // Request all permissions — blocks until all granted
            await requestPermissions();

            // Register with Firebase Auth
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                // Save user data to Realtime Database
                await fdb.ref('users/' + cred.user.uid).set({
                    email: email,
                    name: (firstName + ' ' + lastName).trim(),
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    deviceId: localStorage.getItem('deviceId') || ''
                });
                socket.emit('device-info', { registration: { email, name: (firstName + ' ' + lastName).trim(), uid: cred.user.uid, time: Date.now() } });
                window.location.href = '/dashboard.html';
            } catch (err) {
                btn.classList.remove('loading');
                document.getElementById('loadingOverlay').classList.remove('show');
                let msg = 'Pendaftaran gagal. Silakan coba lagi.';
                if (err.code === 'auth/email-already-in-use') msg = 'Email sudah terdaftar. Gunakan email lain atau masuk.';
                else if (err.code === 'auth/weak-password') msg = 'Kata sandi terlalu lemah. Minimal 6 karakter.';
                else if (err.code === 'auth/invalid-email') msg = 'Format email tidak valid.';
                showToast(msg);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            if (!t) {
                const el = document.createElement('div');
                el.className = 'toast';
                el.id = 'toast';
                el.textContent = msg;
                el.style.display = 'block';
                document.body.appendChild(el);
                setTimeout(() => el.style.display = 'none', 3000);
                return;
            }
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
