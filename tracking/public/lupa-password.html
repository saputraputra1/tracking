<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bantuan — Neural AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05050f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(10,10,30,0.8); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.04); border-radius: 20px; padding: 45px 40px; width: 100%; max-width: 420px; }
        .card .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .card .logo .mark { width: 36px; height: 36px; background: linear-gradient(135deg,#00d4ff,#7c3aed); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; }
        .card .logo span { font-weight: 600; color: #ccc; }
        .card h2 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        .card p { color: #5a5a7e; font-size: 0.85rem; margin-top: 6px; margin-bottom: 28px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.78rem; font-weight: 600; color: #8a8aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .input-field { position: relative; border-radius: 12px; background: #0f0f25; border: 1px solid #1e1e3e; transition: all 0.3s; }
        .input-field:focus-within { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0,212,255,0.06); }
        .input-field input { width: 100%; padding: 15px 16px; background: none; border: none; outline: none; color: #fff; font-size: 0.9rem; font-family: inherit; }
        .input-field input::placeholder { color: #3a3a5e; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg,#00d4ff,#7c3aed); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,212,255,0.2); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #5a5a7e; font-size: 0.82rem; text-decoration: none; }
        .back-link:hover { color: #00d4ff; }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(30,10,20,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,23,68,0.2); color: #ff6b6b; padding: 14px 20px; border-radius: 10px; display: none; animation: slideIn 0.3s ease; font-size: 0.85rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><div class="mark">
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="10" stroke="#fff" stroke-width="2"/><circle cx="16" cy="11" r="1.5" fill="#fff"/><circle cx="21" cy="14" r="1.5" fill="#fff"/><circle cx="21" cy="19" r="1.5" fill="#fff"/><circle cx="16" cy="22" r="1.5" fill="#fff"/><circle cx="11" cy="20" r="1.5" fill="#fff"/><circle cx="11" cy="15" r="1.5" fill="#fff"/></svg>
        </div><span>Neural AI</span></div>
        <h2>Butuh bantuan?</h2>
        <p>Asisten AI Neural siap membantu Anda. Ketik pesan di bawah.</p>
        <div class="input-group">
            <label>Email</label>
            <div class="input-field"><input type="email" placeholder="nama@perusahaan.com" id="emailInput"></div>
        </div>
        <button class="btn" onclick="handleReset()">Kirim Tautan Reset</button>
        <a href="/" class="back-link">Kembali ke halaman masuk</a>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        function handleReset() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            t.textContent = 'Tautan reset telah dikirim ke email Anda (jika terdaftar).';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
